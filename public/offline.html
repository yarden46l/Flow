<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KaizenFlow — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      max-width: 380px;
      width: 100%;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .icon {
      width: 64px; height: 64px;
      background: #eef2ff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon svg { width: 32px; height: 32px; color: #4f46e5; }
    h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 0.5rem; }
    p  { font-size: 0.875rem; color: #64748b; line-height: 1.6; margin-bottom: 1.75rem; }
    .badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.75rem; font-weight: 600;
      background: #f1f5f9; color: #475569;
      border: 1px solid #e2e8f0; border-radius: 9999px;
      padding: 0.375rem 0.875rem;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #f59e0b; }
    button {
      margin-top: 1.25rem;
      width: 100%;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>KaizenFlow couldn't reach the network. The app shell is cached and ready — reconnect to sync your latest tasks and data.</p>
    <div class="badge">
      <span class="dot"></span>
      No internet connection
    </div>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
